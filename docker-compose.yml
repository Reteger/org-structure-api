services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orgdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command:
      - "-dir"
      - "/migrations"
      - "postgres"
      - "postgres://postgres:secret@postgres:5432/orgdb?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: orgdb
      SERVER_PORT: 8080
    restart: unless-stopped

volumes:
  pg-data: